<!DOCTYPE html>
<html>

<head>
    <title>Spreadsheet Comparator</title>
</head>

<body>

<h1>Spreadsheet Comparator</h1>

<form
    action="/compare"
    method="post"
    enctype="multipart/form-data"
>

    <p>Spreadsheet 1</p>

    <input
        type="file"
        name="file1"
        accept=".csv,.xlsx,.xls,.xlsm,.xlsb,.ods,.xml,.tsv,.txt"
        required
    >

    <br><br>

    <p>Spreadsheet 2</p>

    <input
        type="file"
        name="file2"
        accept=".csv,.xlsx,.xls,.xlsm,.xlsb,.ods,.xml,.tsv,.txt"
        required
    >

    <br><br>

    <button type="submit">
        Compare
    </button>

</form>

</body>

</html>
